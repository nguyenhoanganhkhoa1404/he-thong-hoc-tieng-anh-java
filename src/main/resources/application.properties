spring.application.name=EnglishWebsite

# Server Configuration
server.port=8080

# Firebase Configuration
firebase.project-id=ung-dung-hoc-tieng-anh-a0580
firebase.credentials.path=classpath:firebase-service-account.json

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/english_website?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
