spring.application.name=EnglishWebsite

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt-secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
app.jwt-expiration-milliseconds=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:3000,http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/english_website?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
